<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Beauty 记账本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f7f7f7; color: #333; }
  .app { max-width: 480px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #aaa; margin-bottom: 12px; }

  .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .summary-card { background: #fff; border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .summary-card .label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .summary-card .val { font-size: 14px; font-weight: 600; }
  .green { color: #22c55e; } .red { color: #ef4444; } .blue { color: #3b82f6; }

  .month-bar { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .month-bar label { font-size: 12px; color: #999; white-space: nowrap; }
  .month-bar input { border: 1px solid #e5e7eb; border-radius: 7px; padding: 6px 10px; font-size: 13px; flex: 1; outline: none; }
  .month-bar input:focus { border-color: #ec4899; }
  .month-bar button { background: none; border: 1px solid #e5e7eb; border-radius: 7px; padding: 6px 10px; font-size: 12px; color: #999; cursor: pointer; white-space: nowrap; }
  .month-bar button:active { background: #f9fafb; }

  .tabs { display: flex; background: #fff; border-radius: 10px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; cursor: pointer; color: #999; border: none; background: none; }
  .tab.active { background: #ec4899; color: #fff; font-weight: 500; }

  .card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card-title { font-size: 12px; color: #999; margin-bottom: 10px; font-weight: 500; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  input, select { border: 1px solid #e5e7eb; border-radius: 7px; padding: 8px 10px; font-size: 13px; width: 100%; outline: none; }
  input:focus, select:focus { border-color: #ec4899; }

  .btn { background: #ec4899; color: #fff; border: none; border-radius: 7px; padding: 9px 20px; font-size: 13px; cursor: pointer; }
  .btn:active { background: #db2777; }
  .btn-outline { background: #fff; color: #ec4899; border: 1px solid #ec4899; border-radius: 7px; padding: 9px 20px; font-size: 13px; cursor: pointer; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  .record { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .record-main .amount { font-size: 14px; font-weight: 600; }
  .record-main .meta { font-size: 11px; color: #aaa; margin-top: 2px; }
  .record-main .tag { display: inline-block; background: #fdf2f8; color: #ec4899; border-radius: 4px; padding: 1px 6px; font-size: 10px; margin-top: 3px; }
  .del-btn { background: none; border: none; font-size: 20px; color: #ddd; cursor: pointer; line-height: 1; padding: 0 4px; }
  .del-btn:hover { color: #ef4444; }

  .empty { text-align: center; color: #ccc; font-size: 13px; padding: 30px 0; }

  .bar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .bar-label { font-size: 12px; color: #555; width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-wrap { flex: 1; background: #f3f4f6; border-radius: 99px; height: 6px; margin: 0 8px; }
  .bar-fill { background: #ec4899; height: 6px; border-radius: 99px; }
  .bar-val { font-size: 12px; color: #ef4444; width: 56px; text-align: right; }

  .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin-bottom: 6px; }
  .profit-big { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .profit-sub { font-size: 12px; color: #aaa; }

  .service-bar-label { font-size: 12px; color: #555; width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .service-bar-fill { background: #a78bfa; height: 6px; border-radius: 99px; }
  .service-bar-val { font-size: 12px; color: #7c3aed; width: 56px; text-align: right; }

  .page { display: none; }
  .page.active { display: block; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 99px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .export-section { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .export-note { font-size: 11px; color: #bbb; margin-top: 8px; line-height: 1.5; }
  .filter-note { font-size: 11px; color: #ec4899; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app">
  <h1>💅 Luna Beauty</h1>
  <div class="subtitle">记账本</div>

  <div class="summary">
    <div class="summary-card"><div class="label">总收入</div><div class="val green" id="s-income">$0.00</div></div>
    <div class="summary-card"><div class="label">总支出</div><div class="val red" id="s-expense">$0.00</div></div>
    <div class="summary-card"><div class="label">净利润</div><div class="val blue" id="s-profit">$0.00</div></div>
  </div>

  <div class="month-bar">
    <label>筛选月份</label>
    <input type="month" id="month-filter">
    <button onclick="clearFilter()">显示全部</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('income')">收入</button>
    <button class="tab" onclick="switchTab('expense')">支出</button>
    <button class="tab" onclick="switchTab('summary')">分析</button>
    <button class="tab" onclick="switchTab('backup')">备份</button>
  </div>

  <!-- 收入 -->
  <div class="page active" id="page-income">
    <div class="card">
      <div class="card-title">记录收入</div>
      <div class="grid2">
        <input type="date" id="i-date">
        <input type="number" id="i-amount" placeholder="金额 NZD">
      </div>
      <div class="grid2">
        <select id="i-service">
          <option value="">选择服务类型</option>
          <option>Manicure 美甲</option>
          <option>Pedicure 美脚</option>
          <option>Combo 套餐</option>
          <option>Enhancement 加固</option>
          <option>Gel Removal 卸甲</option>
          <option>Nail Art 彩绘</option>
          <option>Waxing 脱毛</option>
          <option>Tinting 染色</option>
          <option>其他</option>
        </select>
        <select id="i-method">
          <option>现金</option><option>刷卡</option><option>转账</option>
        </select>
      </div>
      <div class="grid2" style="margin-bottom:8px">
        <input type="text" id="i-note" placeholder="备注（可选）">
        <div></div>
      </div>
      <button class="btn" onclick="addIncome()">+ 添加</button>
    </div>
    <div id="filter-note-i" class="filter-note" style="display:none"></div>
    <div id="income-list"></div>
  </div>

  <!-- 支出 -->
  <div class="page" id="page-expense">
    <div class="card">
      <div class="card-title">记录支出</div>
      <div class="grid2">
        <input type="date" id="e-date">
        <input type="number" id="e-amount" placeholder="金额 NZD">
      </div>
      <div class="grid2">
        <select id="e-category">
          <option>耗材</option><option>租金</option><option>水电网络</option>
          <option>设备</option><option>营销</option><option>杂项</option>
        </select>
        <input type="text" id="e-note" placeholder="备注（可选）">
      </div>
      <button class="btn" onclick="addExpense()">+ 添加</button>
    </div>
    <div id="filter-note-e" class="filter-note" style="display:none"></div>
    <div id="expense-list"></div>
  </div>

  <!-- 分析 -->
  <div class="page" id="page-summary">
    <div class="card">
      <div class="card-title">收入 — 服务类型</div>
      <div id="service-bars"><div class="empty">暂无收入记录</div></div>
    </div>
    <div class="card">
      <div class="card-title">支出分类</div>
      <div id="cat-bars"><div class="empty">暂无支出记录</div></div>
    </div>
    <div class="card">
      <div class="card-title">利润率</div>
      <div id="profit-rate"><div class="empty">暂无数据</div></div>
    </div>
    <div class="card">
      <div class="card-title">记录统计</div>
      <div class="stat-row"><span>收入记录</span><span id="count-i">0 笔</span></div>
      <div class="stat-row"><span>支出记录</span><span id="count-e">0 笔</span></div>
    </div>
  </div>

  <!-- 备份 -->
  <div class="page" id="page-backup">
    <div class="export-section">
      <div class="card-title">导出数据</div>
      <div class="btn-row">
        <button class="btn" onclick="exportCSV()">导出 CSV 表格</button>
        <button class="btn-outline" onclick="exportTXT()">导出 文本备份</button>
      </div>
      <div class="export-note">CSV 可用 Excel 或 Google Sheets 打开。建议每月导出一次存档。</div>
    </div>
    <div class="export-section">
      <div class="card-title">导入数据（从CSV恢复）</div>
      <div class="btn-row">
        <label class="btn" style="cursor:pointer">
          选择CSV文件
          <input type="file" accept=".csv" onchange="importCSV(event)" style="display:none">
        </label>
      </div>
      <div class="export-note">选择之前导出的CSV文件即可恢复数据。导入会合并到现有数据，不会清空原有记录。</div>
    </div>
    <div class="export-section">
      <div class="card-title">危险操作</div>
      <div class="btn-row">
        <button class="btn-outline" style="color:#ef4444;border-color:#ef4444" onclick="clearAll()">清空所有数据</button>
      </div>
      <div class="export-note" style="color:#f87171">清空后无法恢复，请先导出备份。</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = ["耗材","租金","水电网络","设备","营销","杂项"];
const SERVICES = ["Manicure 美甲","Pedicure 美脚","Combo 套餐","Enhancement 加固","Gel Removal 卸甲","Nail Art 彩绘","Waxing 脱毛","Tinting 染色","其他"];
let data = { incomes: [], expenses: [] };
let activeMonth = "";

function load() {
  try { const d = localStorage.getItem("luna_data"); if (d) data = JSON.parse(d); } catch(e) {}
}

function save() {
  localStorage.setItem("luna_data", JSON.stringify(data));
  showToast("已保存 ✓");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function fmt(n) { return "$" + Number(n).toFixed(2); }
function today() { return new Date().toISOString().split("T")[0]; }
function getMonth(date) { return date ? date.substring(0,7) : ""; }

function clearFilter() {
  document.getElementById("month-filter").value = "";
  activeMonth = "";
  render();
}

document.getElementById("month-filter").addEventListener("change", function() {
  activeMonth = this.value;
  render();
});

function filterByMonth(arr) {
  if (!activeMonth) return arr;
  return arr.filter(r => getMonth(r.date) === activeMonth);
}

function switchTab(name) {
  const names = ["income","expense","summary","backup"];
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", names[i] === name));
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  if (name === "summary") renderSummaryPage();
}

function addIncome() {
  const amt = document.getElementById("i-amount").value;
  if (!amt || isNaN(amt) || Number(amt) <= 0) return alert("请输入有效金额");
  data.incomes.unshift({
    id: Date.now(),
    date: document.getElementById("i-date").value,
    amount: Number(amt),
    service: document.getElementById("i-service").value || "其他",
    method: document.getElementById("i-method").value,
    note: document.getElementById("i-note").value
  });
  document.getElementById("i-amount").value = "";
  document.getElementById("i-note").value = "";
  save(); render();
}

function addExpense() {
  const amt = document.getElementById("e-amount").value;
  if (!amt || isNaN(amt) || Number(amt) <= 0) return alert("请输入有效金额");
  data.expenses.unshift({
    id: Date.now(),
    date: document.getElementById("e-date").value,
    amount: Number(amt),
    category: document.getElementById("e-category").value,
    note: document.getElementById("e-note").value
  });
  document.getElementById("e-amount").value = "";
  document.getElementById("e-note").value = "";
  save(); render();
}

function delIncome(id) {
  if (!confirm("删除这条记录？")) return;
  data.incomes = data.incomes.filter(r => r.id !== id);
  save(); render();
}

function delExpense(id) {
  if (!confirm("删除这条记录？")) return;
  data.expenses = data.expenses.filter(r => r.id !== id);
  save(); render();
}

function clearAll() {
  if (!confirm("确定清空所有数据？此操作不可恢复！")) return;
  data = { incomes: [], expenses: [] };
  save(); render(); showToast("已清空");
}

function render() {
  const incomes = filterByMonth(data.incomes);
  const expenses = filterByMonth(data.expenses);
  const totalI = incomes.reduce((s,r) => s + r.amount, 0);
  const totalE = expenses.reduce((s,r) => s + r.amount, 0);
  const profit = totalI - totalE;

  document.getElementById("s-income").textContent = fmt(totalI);
  document.getElementById("s-expense").textContent = fmt(totalE);
  const pe = document.getElementById("s-profit");
  pe.textContent = fmt(profit);
  pe.className = "val " + (profit >= 0 ? "blue" : "red");

  const monthLabel = activeMonth ? `显示 ${activeMonth} 的记录` : "";
  ["i","e"].forEach(k => {
    const el = document.getElementById(`filter-note-${k}`);
    el.style.display = monthLabel ? "block" : "none";
    el.textContent = monthLabel;
  });

  document.getElementById("income-list").innerHTML = incomes.length === 0
    ? '<div class="empty">暂无记录</div>'
    : incomes.map(r => `<div class="record"><div class="record-main"><div class="amount green">${fmt(r.amount)}</div><div class="meta">${r.date} · ${r.method}</div><span class="tag">${r.service||"其他"}</span>${r.note ? `<span style="font-size:11px;color:#aaa"> · ${r.note}</span>` : ""}</div><button class="del-btn" onclick="delIncome(${r.id})">×</button></div>`).join("");

  document.getElementById("expense-list").innerHTML = expenses.length === 0
    ? '<div class="empty">暂无记录</div>'
    : expenses.map(r => `<div class="record"><div class="record-main"><div class="amount red">${fmt(r.amount)}</div><div class="meta">${r.date} · ${r.category}${r.note ? " · "+r.note : ""}</div></div><button class="del-btn" onclick="delExpense(${r.id})">×</button></div>`).join("");

  document.getElementById("count-i").textContent = incomes.length + " 笔";
  document.getElementById("count-e").textContent = expenses.length + " 笔";
}

function renderSummaryPage() {
  const incomes = filterByMonth(data.incomes);
  const expenses = filterByMonth(data.expenses);
  const totalI = incomes.reduce((s,r) => s + r.amount, 0);
  const totalE = expenses.reduce((s,r) => s + r.amount, 0);
  const profit = totalI - totalE;

  const svcTotals = SERVICES.map(s => ({ name: s, total: incomes.filter(r => r.service === s).reduce((a,r) => a + r.amount, 0) })).filter(s => s.total > 0).sort((a,b) => b.total - a.total);
  document.getElementById("service-bars").innerHTML = svcTotals.length === 0
    ? '<div class="empty">暂无收入记录</div>'
    : svcTotals.map(s => `<div class="bar-row"><div class="bar-label service-bar-label">${s.name}</div><div class="bar-wrap"><div class="bar-fill service-bar-fill" style="width:${totalI>0?Math.min(100,(s.total/totalI)*100):0}%"></div></div><div class="bar-val service-bar-val">${fmt(s.total)}</div></div>`).join("");

  const catTotals = CATS.map(c => ({ name: c, total: expenses.filter(e => e.category === c).reduce((s,e) => s + e.amount, 0) })).filter(c => c.total > 0);
  document.getElementById("cat-bars").innerHTML = catTotals.length === 0
    ? '<div class="empty">暂无支出记录</div>'
    : catTotals.map(c => `<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-wrap"><div class="bar-fill" style="width:${totalE>0?Math.min(100,(c.total/totalE)*100):0}%"></div></div><div class="bar-val">${fmt(c.total)}</div></div>`).join("");

  document.getElementById("profit-rate").innerHTML = totalI === 0
    ? '<div class="empty">暂无收入记录</div>'
    : `<div class="profit-big ${profit>=0?'blue':'red'}">${((profit/totalI)*100).toFixed(1)}%</div><div class="profit-sub">每赚100块，净赚${((profit/totalI)*100).toFixed(1)}块</div>`;
}

function exportCSV() {
  let csv = "\uFEFF类型,日期,金额(NZD),服务/分类,付款方式,备注\n";
  data.incomes.forEach(r => { csv += `收入,${r.date},${r.amount},${r.service||""},${r.method},${r.note||""}\n`; });
  data.expenses.forEach(r => { csv += `支出,${r.date},${r.amount},${r.category},,${r.note||""}\n`; });
  download("Luna_Beauty_账单.csv", csv, "text/csv");
}

function exportTXT() {
  const totalI = data.incomes.reduce((s,r) => s + r.amount, 0);
  const totalE = data.expenses.reduce((s,r) => s + r.amount, 0);
  let txt = `Luna Beauty 账单备份\n导出时间：${new Date().toLocaleString("zh")}\n总收入：$${totalI.toFixed(2)}  总支出：$${totalE.toFixed(2)}  净利润：$${(totalI-totalE).toFixed(2)}\n\n===收入===\n`;
  data.incomes.forEach(r => { txt += `${r.date}  $${r.amount.toFixed(2)}  ${r.service||""}  ${r.method}  ${r.note||""}\n`; });
  txt += `\n===支出===\n`;
  data.expenses.forEach(r => { txt += `${r.date}  $${r.amount.toFixed(2)}  ${r.category}  ${r.note||""}\n`; });
  download("Luna_Beauty_备份.txt", txt, "text/plain");
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split("\n").slice(1);
    let added = 0;
    lines.forEach(line => {
      const cols = line.split(",");
      if (cols.length < 4) return;
      const [type, date, amount, cat, method, note] = cols.map(c => c.trim().replace(/^"|"$/g, ""));
      if (!date || !amount || isNaN(amount)) return;
      if (type === "收入") {
        data.incomes.push({ id: Date.now() + Math.random(), date, amount: Number(amount), service: cat||"其他", method: method||"现金", note: note||"" });
        added++;
      } else if (type === "支出") {
        data.expenses.push({ id: Date.now() + Math.random(), date, amount: Number(amount), category: cat||"杂项", note: note||"" });
        added++;
      }
    });
    save(); render();
    showToast(`导入成功，共 ${added} 条记录`);
    event.target.value = "";
  };
  reader.readAsText(file, "utf-8");
}

function download(filename, content, type) {
  const blob = new Blob([content], { type: type + ";charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast("导出成功 ✓");
}

load();
document.getElementById("i-date").value = today();
document.getElementById("e-date").value = today();
render();
</script>
</body>
</html>
